name: Update Changelog

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  release:
    types: [published]
  push:
    paths:
      - '.github/workflows/auto_change_log.yml'
      - '.github/workflows/auto_change_log.md'

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  copilot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: github/copilot-coding-agent@v1
        with:
          prompt-file: .github/workflows/auto_change_log.md
          skip-if-match: 'is:pr is:open head:automation/update-changelog label:documentation label:automated-pr'
