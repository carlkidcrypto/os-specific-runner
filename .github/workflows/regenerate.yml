name: regenerate

permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch:
  pull_request:
    branches: [ main, master ]
    paths:
      - 'index.js'
      - 'package.json'
      - 'package-lock.json'

jobs:
  regenerate_dist-index_js:
    runs-on: ubuntu-latest
    steps:
    - 
      uses: actions/checkout@v6
    - 
      name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
    - 
      name: regenerate dist/index.js
      run: |
        npm i -g @vercel/ncc@0.38.4
        npm install
        ncc build index.js -m
    -
      name: Create Pull Request
      if: github.event_name == 'workflow_dispatch'
      uses: peter-evans/create-pull-request@v8
      with:
        commit-message: Regenerate dist/index.js
        branch: regenerate-dist-index-js
        title: 'chore: regenerate dist/index.js'
        body: 'Automated regeneration of `dist/index.js` via the regenerate workflow.'
        add-paths: dist/index.js
    -
      name: Git Auto Commit
      if: github.event_name != 'workflow_dispatch'
      uses: stefanzweifel/git-auto-commit-action@v7
      with:
        file_pattern: dist/index.js
        commit_message: Regenerate dist/index.js