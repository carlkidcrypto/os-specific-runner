name: Auto Update Release Notes

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      backfill_all:
        description: 'Backfill release notes for ALL existing releases'
        required: false
        default: 'false'
  push:
    paths:
      - '.github/workflows/auto_release_notes.yml'
      - '.github/workflows/auto_release_notes.md'

permissions:
  actions: read
  contents: write

jobs:
  copilot:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: github/copilot-coding-agent@v1
        with:
          prompt-file: .github/workflows/auto_release_notes.md
