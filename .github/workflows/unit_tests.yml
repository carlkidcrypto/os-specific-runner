name: unit_tests
permissions:
  contents: read
  id-token: write
  pull-requests: write

on:
  push:
    branches: [ main, master ]
    paths:
      - 'index.js'
      - 'lib.js'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'babel.config.cjs'
      - '.github/workflows/unit_tests.yml'

  pull_request:
    branches: [ main, master ]
    paths:
      - 'index.js'
      - 'lib.js'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'babel.config.cjs'
      - '.github/workflows/unit_tests.yml'

jobs:
  unit_tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]

    steps:
      - name: Check out source code...
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          flags: ${{ matrix.os }}
